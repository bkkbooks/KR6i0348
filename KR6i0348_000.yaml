front:
  text: 楞伽楞嚴合轍序楞伽以達磨重楞嚴以智者重並為緇門要典而其流通淺深之故亦略相類當楞伽之機者大慧也自覺聖智境界惟證乃知而譯者艱晦其詞使讀者棘口瞪目徐思之又如蚊咬鐵牛了無入處故中下之士不甚躍然當楞嚴之機者慶喜也其落想送難與凡夫頗近又得文士為之潤色讀者如癢得搔各以思惟分別通之至旁引經論之似者為注腳雖復近之彌益戲論自來講席于此二經不過守其師説期無大謬而止至雪浪大師出始盡掃依門傍戶之病一以自心現量出之覺靈山一會重開生面然師舌而不筆聊為人天留一影而已自是而諸師撰述各露鋒頴數年來可謂人握靈蛇至交光之正脈幾于前無古人矣然于楞伽猶未遑也二經並有發明惟憨山老人及今一雨法師耳師少參雪浪夙佩傳心之印浪不拘細節一時門人皆鮮衣跅弛師獨蕭然一衲三十年無改以大辨才具杜都行浪既化去諸衲子競以瓣香歸師師謙讓未遑而輝山媚川之譽愈不可掩近者結茅于鐵山之麓巢棲茹薇靜照益徹因詮釋二經成若干卷命曰合轍殺青既竟以示不命序之余惟無上大覺豈有轍之可合哉顧守轍非也不能合轍而遽欲舍轍尤非也夫性相二宗非所以適涅槃城之兩輪耶至于破相一宗如王良造父然非能廢兩輪而別挾一長也或者欲以此而遺彼亦過矣就二經言之五法三自性八識二無我三科七大不粲然相乎乃若百八句之問山河大地之問拈是見非見而皆曰是舉因緣自然而皆曰非使以宗門家風會之雖通身是口能下一語否然則謂如來禪之外有祖師禪猶第二義也師生平持論在于矯二宗之偏鋒驅顢頇之狂慧觀其所述蓋詳哉其言之至于言之所不能詮引而不發躍如也師蓋曰吾聊以轍示焉世有絶塵而奔者吾將旦暮遇之耳然則此書之行固浪師之後𦦨亦靈山之耳孫也余家珠塢中去鐵山僅一袈裟地三年來侍師于水邊林下每相與了無可共語之語是編成余竊快焉因題數語于簡末不自知其為門外人也天啓辛酉重九日吳下菩薩闡提王志堅合十書楞伽合轍自序易曰盈天地之間者唯萬物然則萬物之在天地者雖多而名相一言可以盡蔽今夫世之人以高明者為天厚載者為地巍然突起者為山汪洋平演者為江海川瀆飛者為鳥躍者為魚走者為獸林林總總蔚蔚蔥蔥者為草木夫高明者是相而天即名也博厚者是相而地即名也巍然突起者是相而山即名也汪洋滉漾者是相而江海川瀆即名也飛躍是相而魚鳥即名也奔馳是相而獸即名也林林總總者是相而草木即名也故知天地之大萬物之多統而論之皆屬名相更無別法是以天不自知為高明地不自知為廣厚山不自知為突起水不自知為汪洋魚鳥不自知為飛躍獸不自知為奔馳草木不自知為蓊鬱然而必以高明者為天博厚者為地突起者為山汪洋者為江海川瀆飛者為鳥躍者為魚馳者為獸總總林林者為草木一定而不可移易者何居皆是與天地並立而為萬物之最靈者名之曰人是人與天地萬物安種種名立種種相謂之妄想建立又謂之意言境其實天地萬物未始有種種相亦未始有種種名也名相既立於是乎卑高陳焉貴賤位焉有無傾焉妍醜出焉彼此立焉是非興焉於是乎執此名非彼名此相非彼相而彼彼此此是是非非森然柴立於心目之間矣其中有具正法眼者以法眼觀了知天地萬物種種名相原從我人妄想建立本非實有本自如如故雖孑然雜處於天地萬物之中而天地萬物種種名相不能眩惑其耳目而能會天地萬物皆歸於自己不以彼為彼不以此為此不以是為是不以非為非故天地如萬物如而人我亦如於是乎指芥子為須彌亦可殤子為壽亦可呼馬為牛亦可指天作地亦可以能真見天地同根萬物一體不見有絲毫異名異相為障為礙故能得意生身隨心自在旁於萬物之內而物莫能拘者由此道也是知名相皆生乎妄想而能了名相本非實有者名正智如如此名相所以為凡聖之通衢也此經所詮除五法外雖別開三自性八識二無我然皆不出五法所謂五法者謂名相妄想正智如如也言八識者謂眼識耳識鼻識舌識身識意識末那識含藏識也言三性者謂妄想自性緣起自性成自性也二無我者謂人無我法無我也蓋八識是名相是妄想轉八識成智即是正智是如如此即八識亦五法也緣起自性即名相妄想自性即妄想成自性即正智如如即三自性亦五法也於名相上執我執法執即妄想我法即名相若以正智了此我法本空即證二空無我之真如是則我與無我亦五法也故舉五法而天地萬物乃至世間出世間出世間上上法統攝無遺矣故經云三種自性及八種識二種無我悉入五法又云此五法者聲聞緣覺菩薩及如來自覺聖智諸地相續次第一切佛法悉入其中是知盈天地之間者唯萬物而天地萬物不出名相異生之所迷者迷此諸聖之所悟者悟此何以故以執名相為實有而分彼此起是非由彼此是非皆屬妄想以從妄想故説為迷為異生若了名相本空妄想非有則為正智為如如以從如如正智故説為悟為諸聖此則不唯名無定名相無定相即凡聖亦無定位亦屬名相建立故一舉名相而五法立五法立而一心顯一心顯而一切佛法皆入其中矣初祖達磨云楞伽四卷可以印心是則此經為佛佛授手祖祖相傳之心印如來禪祖師禪之所自出故以佛語心為宗也第此經四教並攝性相通收然性相二宗雖堂皇無異而戶牖各開從上諸師解此經者或依性以解相而宗相者則執相以難性或依相以解性而宗性者則執性以破相故主馬鳴者賓護法宗護法者詆馬鳴所謂操戈入室禍越蕭墻此皆不達唯心唯識之宗一而二二而一者也故凡值經之性相分途處雙引性相併釋之皎如星月各有指歸務令性相二宗如車兩輪並行不悖此余之深意也故命名合轍若由此轍而登路由此路而登不可往之楞伽山頂則一躂可到尚何艱險之有哉時天啓辛酉歲夏五端陽後三日書于天界講堂二楞庵釋通潤謹識
